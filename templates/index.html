<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression - Sales Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main>
        <div class="card">
            <h1>Linear Regression</h1>
            <p class="subtitle">Sales Prediction Using TV Advertisement Budget</p>

            <div class="input-group">
                <label for="tv-budget">TV Advertisement Budget</label>
                <input type="number" id="tv-budget" placeholder="Enter budget amount" step="any">
            </div>

            <button id="predict-btn">Predict</button>

            <div class="result-box" id="result-box">
                <span class="result-label">Predicted Sales</span>
                <span class="result-value" id="result-value">—</span>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
